name: Basic workflow
run-name: Build project by ${{ github.actor }}
on: #Quand s'exécute ce workflow ?
  pull_request: #branch and path condition must be satisfied
    types:
      - opened
      - synchronize
    branches:
      - main
      - feat/** #launch workflow, if branch starts by <i>feat</i>
  workflow_dispatch: {}


permissions:
  pull-requests: write

jobs:
  test:
    name: building
    runs-on: ubuntu-latest # Où s'exécute le job ?
    permissions:
      pull-requests: write

    steps: # Qu'exécutons-nous ?
      - uses: actions/checkout@v6
        id: checkout
        with:
          fetch-depth: 0

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          overwrite-settings: true
          cache: maven

      - name: Test with maven
        run: ./mvnw clean verify

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          registry: docker.io
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          logout: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          driver: docker-container
          platforms: linux/amd64,linux/arm64

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ vars.DOCKERHUB_USERNAME }}/${{ vars.REGISTRY }}/${{ vars.IMAGE_NAME }}
          tags: |            
            type=ref,event=pr,prefix=formation-                     
            type=sha

      - name: Build and push with timestamp tag
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}

