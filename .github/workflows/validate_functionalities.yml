name: Basic workflow
run-name: Build project by ${{ github.actor }}
on: #Quand s'exécute ce workflow ?
  pull_request: #branch and path condition must be satisfied
    types:
      - opened
      - synchronize
    branches:
      - main
      - feat/** #launch workflow, if branch starts by <i>feat</i>
  workflow_dispatch: {}


permissions:
  pull-requests: write

jobs:
  test:
    name: building
    runs-on: ubuntu-latest # Où s'exécute le job ?
    permissions:
      pull-requests: write

    steps: # Qu'exécutons-nous ?
      - uses: actions/checkout@v6
        id: checkout
        with:
          fetch-depth: 0

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          overwrite-settings: true
          cache: maven

      - name: Test with maven
        run: ./mvnw clean verify

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          registry: docker.io
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          logout: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          driver: docker-container
          platforms: linux/amd64,linux/arm64

      - name: Set PR tags
        id: pr-tags
        if: github.event_name == 'pull_request'
        run: |
          PR_NUMBER=$(echo ${{ github.event.pull_request.number }})
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          DATE=$(date +'%Y%m%d%H%M%S')
          echo "tag1=pr-${PR_NUMBER}" >> $GITHUB_OUTPUT
          echo "tag2=${SHORT_SHA}-${DATE}" >> $GITHUB_OUTPUT

      - name: Set main tags
        id: main-tags
        if: github.ref == 'refs/heads/main'
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          DATE=$(date +'%Y%m%d%H%M%S')
          echo "tag1=main-${SHORT_SHA}-${DATE}" >> $GITHUB_OUTPUT          
          echo "tag2=latest" >> $GITHUB_OUTPUT

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
#          images: ${{ vars.DOCKERHUB_USERNAME }}/${{ vars.REGISTRY }}
          images: ${{ vars.DOCKERHUB_USERNAME }}/examemo-back
          tags: |            
            type=ref,event=pr,prefix=pr-,suffix=
            type=sha,format=short,prefix={{date 'YYYYMMDDHHmmss'}}-,enable=${{ github.event_name == 'pull_request' }}
                        
            type=raw,value=main-{{sha}}-{{date 'YYYYMMDDHHmmss'}},enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push with timestamp tag
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}

